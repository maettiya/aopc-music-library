<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About | AOPC Music Library</title>
    <meta
      name="description"
      content="About AOPC Music Library and contact details."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="logo" href="index.html" aria-label="AOPC Music Library Home">
          <img
            src="aopc-logo.png"
            alt="AOPC Music Library"
            onerror="this.style.display='none';this.parentElement.classList.add('logo-missing');"
          />
          <span class="logo-fallback">AOPC</span>
        </a>
        <nav class="top-nav" aria-label="Main navigation">
          <a href="index.html#collections">Collections</a>
          <a href="#" aria-label="Cart">Cart <span data-cart-count>(0)</span></a>
        </nav>
      </header>

      <main>
        <section class="reveal">
          <div class="section-head">
            <h1>About</h1>
            <p>
              AOPC Music Library is a growing archive of original compositions and
              stem-ready records built for sampling, editing, and production use.
            </p>
          </div>

          <div class="pack-info-block">
            <h2>Contact</h2>
            <p>
              Email: contact@aopcmusiclibrary.com
            </p>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>2026 AOPC MUSIC LIBRARY</p>
        <div class="logo-mark">
          <img src="aopc-logo.png" alt="AOPC Music Library" />
        </div>
        <p class="socials"><a href="about.html">ABOUT</a></p>
      </footer>
    </div>

    <script src="packs.js"></script>
    <script src="app.js"></script>
  </body>
</html>
